openapi: 3.0.3
info:
  title: "NeoMarket B2C: Заказы"
  version: "0.1"
  description: |
    Проектируется синдикатом QA Corps.
    Домены: оформление заказа, статусы (state machine), отмена, история заказов.

tags:
  - name: StockReserve
  - name: Orders
  - name: Analytics

paths:
  /stock/reserve/{order_id}:
    post:
      tags: [StockReserve]
      summary: Зарезервировать товары по заказу
      operationId: reserveStock
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReserveRequest'
      responses:
        '201':
          description: Резерв создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        '200':
          description: Идемпотентный повтор — резерв уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        '409':
          description: Недостаточно stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '424':
          description: Ошибка интеграции со складом
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags: [StockReserve]
      summary: Получить статус резерва по заказу
      operationId: getReservation
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Статус найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        '404':
          description: Резерв не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /stock/reserve/{order_id}/commit:
    post:
      tags: [StockReserve]
      summary: Подтвердить резерв и списать товар (write-off)
      operationId: commitReservation
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Списание выполнено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        '409':
          description: Некорректный статус резерва для списания
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '424':
          description: Ошибка интеграции со складом
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /stock/reserve/{order_id}/release:
    post:
      tags: [StockReserve]
      summary: Снять резерв и вернуть товар в доступный stock
      operationId: releaseReservation
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Возврат выполнен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        '409':
          description: Некорректный статус резерва для возврата
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '424':
          description: Ошибка интеграции со складом
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /orders:
    get:
      tags: [Orders]
      summary: Получение списка заказов пользователя
      operationId: getOrders
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Количество записей на странице
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Смещение для пагинации
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, reserved, reservation_failed, paid, payment_failed, preparing, shipping, delivered, completed, cancelled, refunded]
          description: Фильтр по статусу заказа
        - name: date_from
          in: query
          schema:
            type: string
            format: date
          description: Начальная дата создания заказа (включительно)
        - name: date_to
          in: query
          schema:
            type: string
            format: date
          description: Конечная дата создания заказа (включительно)
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrderSummary'
                  total:
                    type: integer
                    description: Общее количество заказов (без учёта пагинации)
                  limit:
                    type: integer
                  offset:
                    type: integer
        '401':
          description: Не авторизован
        '403':
          description: Доступ запрещён

  /orders/{order_id}:
    get:
      tags: [Orders]
      summary: Получение детальной информации о заказе
      operationId: getOrderById
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Идентификатор заказа
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetails'
        '401':
          description: Не авторизован
        '403':
          description: Нет прав на просмотр этого заказа
        '404':
          description: Заказ не найден

  /analytics/orders:
    get:
      tags: [Analytics]
      summary: Получение аналитических отчётов по заказам
      operationId: getOrdersAnalytics
      parameters:
        - name: group_by
          in: query
          schema:
            type: string
            enum: [day, week, month, status]
            default: day
          description: Способ группировки данных (day/week/month — временная, status — по статусам)
        - name: date_from
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Начальная дата периода
        - name: date_to
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Конечная дата периода
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
          description: Фильтр по конкретному пользователю (только для админа/менеджера)
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AnalyticsTimeSeries'
                  - $ref: '#/components/schemas/AnalyticsByStatus'
        '400':
          description: Неверные параметры запроса
        '401':
          description: Не авторизован
        '403':
          description: Недостаточно прав

components:
  schemas:
    ReserveRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ReserveItem'
        ttl_seconds:
          type: integer
          minimum: 60
          default: 900
          description: Время жизни резерва (таймаут), после которого cron снимет резерв

    ReserveItem:
      type: object
      required: [product_id, quantity]
      properties:
        product_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1

    Reservation:
      type: object
      required:
        - order_id
        - status
        - created_at
        - expires_at
        - reserved_products
      properties:
        order_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, reserved, reservation_failed, paid, payment_failed, preparing, shipping, delivered, completed, cancelled, refunded]
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        reserved_products:
          type: array
          items:
            $ref: '#/components/schemas/ReservedProduct'

    ReservedProduct:
      type: object
      description: Соответствует строке в таблице reserved_products
      required: [order_id, product_id, quantity, created_at]
      properties:
        order_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
        created_at:
          type: string
          format: date-time

    ProductsReservedEvent:
      type: object
      required: [event_id, event_type, occurred_at, payload]
      properties:
        event_id:
          type: string
          format: uuid
        event_type:
          type: string
          enum: [products.reserved]
        occurred_at:
          type: string
          format: date-time
        payload:
          type: object
          required: [order_id, items, expires_at]
          properties:
            order_id:
              type: string
              format: uuid
            items:
              type: array
              items:
                $ref: '#/components/schemas/ReserveItem'
            expires_at:
              type: string
              format: date-time

    OrderSummary:
      type: object
      properties:
        order_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        total_price:
          type: number
          format: float
        status:
          type: string
          enum: [pending, reserved, reservation_failed, paid, payment_failed, preparing, shipping, delivered, completed, cancelled, refunded]
        item_count:
          type: integer
          description: Количество позиций в заказе

    OrderDetails:
      allOf:
        - $ref: '#/components/schemas/OrderSummary'
        - type: object
          properties:
            updated_at:
              type: string
              format: date-time
            shipping_address:
              type: string
            payment_method:
              type: string
            items:
              type: array
              items:
                $ref: '#/components/schemas/OrderItem'
            reservation:
              $ref: '#/components/schemas/Reservation'

    OrderItem:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
        product_name:
          type: string
        quantity:
          type: integer
        price_at_purchase:
          type: number
          format: float
        subtotal:
          type: number
          format: float

    AnalyticsTimeSeries:
      type: object
      properties:
        group_by:
          type: string
          enum: [day, week, month]
        data:
          type: array
          items:
            type: object
            properties:
              period:
                type: string
                format: date
              orders_count:
                type: integer
              total_revenue:
                type: number
                format: float
              avg_order_value:
                type: number
                format: float

    AnalyticsByStatus:
      type: object
      properties:
        group_by:
          type: string
          enum: [status]
        data:
          type: array
          items:
            type: object
            properties:
              status:
                type: string
                enum: [pending, reserved, reservation_failed, paid, payment_failed, preparing, shipping, delivered, completed, cancelled, refunded]
              count:
                type: integer
              total_revenue:
                type: number
                format: float

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true

x-cron-jobs:
  - name: reservation-expirer
    schedule: "*/1 * * * *"
    action: "Переводит RESERVED -> EXPIRED, вызывает release в warehouse, обновляет reserved_products/статус"