          type: string
          format: uuid
          example: "5f7d0d8b-4d3f-4d0d-9d6d-8f4a7c2e1b11"
        accepted:
          type: boolean
          example: true
        notification_ids:
          type: array
          items:
            type: string
            format: uuid

    MarkAllReadResponse:
      type: object
      required:
        - updated_count
