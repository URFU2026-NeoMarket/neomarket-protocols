        updated_count:
          type: integer
          example: 8

    RetryNotificationResponse:
      type: object
      required:
        - notification_id
        - status
      properties:
        notification_id:
          type: string
          format: uuid
          example: "2efb63a9-60bb-4b6d-a8bb-0cefc91ed112"
        status:
          type: string
          example: "retry_started"

    TestNotificationRequest:
      type: object
