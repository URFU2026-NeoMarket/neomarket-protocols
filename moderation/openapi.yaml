openapi: 3.0.0
info:
  title: NeoMarket Moderation
  version: 1.0.0
  description: |
  API для модерации товаров с поддержкой снимков и событий
  Модуль модерации товаров.

    Логика работы:
    1. Moderation узнаёт что товар создан или изменён (формат события — ???)
    2. Запрашивает данные товара из B2B (GET /api/v1/products/{id})
    3. Сохраняет снимок товара. Если товар изменён — два снимка: "до" и "после"
    4. Модератор берёт карточку из очереди и проверяет
    5. Одобряет или блокирует — и сообщает B2B (формат события — ???)

servers:
  - url: https://moderation-api.example.com/v1
    description: Moderation service

tags:
  - name: Moderation
    description: Управление модерацией товаров
  - name: Snapshots
    description: Снимки товаров
  - name: Webhooks
    description: Вебхуки для событий

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    # --- Базовые типы ---
    ProductId:
      type: integer
      minimum: 1
      example: 12345

    Timestamp:
      type: string
      format: date-time
      example: "2024-01-15T10:30:00Z"

    EventId:
      type: string
      format: uuid
      example: "123e4567-e89b-12d3-a456-426614174000"

    # --- События с дискриминатором ---
    BaseProductEvent:
      type: object
      required:
        - event_id
        - event_type
        - product_id
        - timestamp
      properties:
        event_id:
          $ref: '#/components/schemas/EventId'
        event_type:
          type: string
          enum:
            - product.created
            - product.updated
            - product.deleted
        product_id:
          $ref: '#/components/schemas/ProductId'
        timestamp:
          $ref: '#/components/schemas/Timestamp'
        producer:
          type: string
          default: "b2b-service"
          example: "b2b-service"

    ProductCreatedEvent:
      allOf:
        - $ref: '#/components/schemas/BaseProductEvent'
        - type: object
          properties:
            data:
              type: object
              properties:
                created_by:
                  type: integer
                  example: 42
                initial_status:
                  type: string
                  example: "draft"

    ProductUpdatedEvent:
      allOf:
        - $ref: '#/components/schemas/BaseProductEvent'
        - type: object
          properties:
            data:
              type: object
              properties:
                changed_fields:
                  type: array
                  items:
                    type: string
                  example: ["name", "price", "description"]
                updated_by:
                  type: integer
                  example: 42

    ProductEvent:
      oneOf:
        - $ref: '#/components/schemas/ProductCreatedEvent'
        - $ref: '#/components/schemas/ProductUpdatedEvent'
      discriminator:
        propertyName: event_type
        mapping:
          product.created: '#/components/schemas/ProductCreatedEvent'
          product.updated: '#/components/schemas/ProductUpdatedEvent'

    # --- Модерация ---
    ModerationStatus:
      type: string
      enum:
        - pending
        - approved
        - rejected
        - changes_required
        - draft
      example: "pending"

    ProductSnapshot:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1001
        product_id:
          $ref: '#/components/schemas/ProductId'
        version:
          type: integer
          example: 3
        data:
          type: object
          description: Полные данные товара из B2B
          additionalProperties: true
        hash:
          type: string
          example: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
        created_at:
          $ref: '#/components/schemas/Timestamp'
        source_event:
          type: object
          properties:
            event_id:
              $ref: '#/components/schemas/EventId'
            event_type:
              type: string

    ModerationTask:
      type: object
      required:
        - product_id
        - snapshot_id
      properties:
        id:
          type: integer
          readOnly: true
          example: 5001
        product_id:
          $ref: '#/components/schemas/ProductId'
        snapshot_id:
          type: integer
          example: 1001
        previous_snapshot_id:
          type: integer
          nullable: true
          example: 1000
        status:
          $ref: '#/components/schemas/ModerationStatus'
        priority:
          type: integer
          minimum: 1
          maximum: 10
          default: 5
          example: 7
        assigned_to:
          type: integer
          nullable: true
          example: 42
        assigned_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          $ref: '#/components/schemas/Timestamp'
        updated_at:
          $ref: '#/components/schemas/Timestamp'

    RejectReason:
      type: string
      enum:
        - inappropriate_content
        - poor_quality
        - incorrect_category
        - trademark_violation
        - prohibited_item
        - other
      example: "inappropriate_content"

    ModerationDecision:
      type: object
      required:
        - decision
      properties:
        decision:
          type: string
          enum: [approved, rejected, changes_required]
          example: "approved"
        comment:
          type: string
          maxLength: 1000
          example: "Все хорошо, товар соответствует требованиям"
        reject_reason:
          $ref: '#/components/schemas/RejectReason'
        required_changes:
          type: array
          items:
            type: string
          example: ["Исправить описание", "Добавить фото"]
        moderator_id:
          type: integer
          example: 42

    ModerationResultEvent:
      type: object
      required:
        - event_id
        - event_type
        - product_id
        - decision
        - timestamp
      properties:
        event_id:
          $ref: '#/components/schemas/EventId'
        event_type:
          type: string
          enum:
            - moderation.approved
            - moderation.rejected
            - moderation.changes_required
          example: "moderation.approved"
        product_id:
          $ref: '#/components/schemas/ProductId'
        decision:
          $ref: '#/components/schemas/ModerationDecision'
        snapshot_id:
          type: integer
          example: 1001
        timestamp:
          $ref: '#/components/schemas/Timestamp'

    # --- Сравнение снимков ---
    ChangeType:
      type: string
      enum: [added, removed, modified]
      example: "modified"

    FieldDiff:
      type: object
      properties:
        field:
          type: string
          example: "price"
        old_value:
          type: string
          nullable: true
          example: "1000"
        new_value:
          type: string
          nullable: true
          example: "1200"
        change_type:
          $ref: '#/components/schemas/ChangeType'

    SnapshotDiff:
      type: object
      properties:
        snapshot_a_id:
          type: integer
          example: 1000
        snapshot_b_id:
          type: integer
          example: 1001
        differences:
          type: array
          items:
            $ref: '#/components/schemas/FieldDiff'

    # --- Пагинация ---
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 150
        pages:
          type: integer
          example: 8

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
        pagination:
          $ref: '#/components/schemas/Pagination'

    # --- Ошибки ---
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Validation Error"
        message:
          type: string
          example: "Invalid input data"
        code:
          type: string
          example: "VALIDATION_ERROR"
        details:
          type: object
          nullable: true
          additionalProperties: true

    # --- Статистика ---
    ModerationStats:
      type: object
      properties:
        period:
          type: string
          enum: [today, week, month, all]
          example: "week"
        total_tasks:
          type: integer
          example: 245
        pending_tasks:
          type: integer
          example: 23
        completed_tasks:
          type: integer
          example: 222
        avg_decision_time:
          type: number
          format: float
          example: 3600.5
        decisions_by_type:
          type: object
          properties:
            approved:
              type: integer
              example: 180
            rejected:
              type: integer
              example: 30
            changes_required:
              type: integer
              example: 12
        top_reject_reasons:
          type: array
          items:
            type: object
            properties:
              reason:
                $ref: '#/components/schemas/RejectReason'
              count:
                type: integer
                example: 15

  parameters:
    ProductIdParam:
      name: product_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ProductId'
      description: ID товара

    TaskIdParam:
      name: task_id
      in: path
      required: true
      schema:
        type: integer
      description: ID задачи модерации

    SnapshotIdParam:
      name: snapshot_id
      in: path
      required: true
      schema:
        type: integer
      description: ID снимка

  responses:
    NotFoundError:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Not Found"
            message: "Task with id 9999 not found"
            code: "NOT_FOUND"

paths:
  # --- Webhook для приема событий от B2B ---
  /webhooks/b2b/product-events:
    post:
      summary: Прием событий о товарах от B2B системы
      operationId: receiveProductEvent
      tags:
        - Webhooks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ProductCreatedEvent'
                - $ref: '#/components/schemas/ProductUpdatedEvent'
            examples:
              created:
                summary: Событие создания товара
                value:
                  event_id: "123e4567-e89b-12d3-a456-426614174000"
                  event_type: "product.created"
                  product_id: 12345
                  timestamp: "2024-01-15T10:30:00Z"
                  producer: "b2b-service"
                  data:
                    created_by: 42
                    initial_status: "draft"
              updated:
                summary: Событие обновления товара
                value:
                  event_id: "123e4567-e89b-12d3-a456-426614174001"
                  event_type: "product.updated"
                  product_id: 12345
                  timestamp: "2024-01-15T11:45:00Z"
                  producer: "b2b-service"
                  data:
                    changed_fields: ["name", "price", "description"]
                    updated_by: 42
      responses:
        '202':
          description: Событие принято в обработку
          headers:
            Location:
              schema:
                type: string
              example: "/api/v1/moderation/events/123"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "accepted"
                  event_id:
                    $ref: '#/components/schemas/EventId'
                  message:
                    type: string
                    example: "Event accepted for processing"
        '400':
          description: Невалидное событие
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Не авторизован

  # --- API для работы с задачами модерации ---
  /moderation/tasks:
    get:
      summary: Получение списка задач модерации
      operationId: getModerationTasks
      tags:
        - Moderation
      parameters:
        - name: status
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ModerationStatus'
          style: form
          explode: false
          description: Фильтр по статусам
        - name: product_id
          in: query
          schema:
            $ref: '#/components/schemas/ProductId'
          description: Фильтр по товару
        - name: assigned_to
          in: query
          schema:
            type: integer
          description: Фильтр по модератору
        - name: priority_min
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 10
        - name: created_from
          in: query
          schema:
            type: string
            format: date-time
        - name: created_to
          in: query
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [created_at, priority, product_id]
            default: created_at
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Список задач
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ModerationTask'

    post:
      summary: Создание задачи модерации (ручной ввод)
      operationId: createModerationTask
      tags:
        - Moderation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - product_id
              properties:
                product_id:
                  $ref: '#/components/schemas/ProductId'
                priority:
                  type: integer
                  minimum: 1
                  maximum: 10
                  default: 5
                notes:
                  type: string
                  maxLength: 500
      responses:
        '201':
          description: Задача создана
          headers:
            Location:
              schema:
                type: string
              example: "/api/v1/moderation/tasks/5001"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModerationTask'

  /moderation/tasks/{task_id}:
    get:
      summary: Получение деталей задачи
      operationId: getModerationTask
      tags:
        - Moderation
      parameters:
        - $ref: '#/components/parameters/TaskIdParam'
      responses:
        '200':
          description: Детали задачи
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModerationTask'
        '404':
          $ref: '#/components/responses/NotFoundError'

    patch:
      summary: Обновление задачи (назначение модератора)
      operationId: updateModerationTask
      tags:
        - Moderation
      parameters:
        - $ref: '#/components/parameters/TaskIdParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                assigned_to:
                  type: integer
                  nullable: true
                priority:
                  type: integer
                  minimum: 1
                  maximum: 10
      responses:
        '200':
          description: Задача обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModerationTask'

  /moderation/tasks/{task_id}/decide:
    post:
      summary: Принять решение по задаче
      operationId: makeModerationDecision
      tags:
        - Moderation
      parameters:
        - $ref: '#/components/parameters/TaskIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModerationDecision'
      responses:
        '200':
          description: Решение принято
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  task:
                    $ref: '#/components/schemas/ModerationTask'
                  notification_sent:
                    type: boolean
                    example: true
        '400':
          description: Некорректное решение
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          description: Задача уже решена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /moderation/tasks/queue:
    get:
      summary: Получить следующую задачу из очереди
      operationId: getNextTask
      tags:
        - Moderation
      parameters:
        - name: moderator_id
          in: query
          required: true
          schema:
            type: integer
        - name: priority_threshold
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 5
      responses:
        '200':
          description: Следующая задача
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModerationTask'
        '204':
          description: Нет задач в очереди

  # --- API для работы со снимками ---
  /moderation/snapshots/product/{product_id}:
    get:
      summary: Получить все снимки товара
      operationId: getProductSnapshots
      tags:
        - Snapshots
      parameters:
        - $ref: '#/components/parameters/ProductIdParam'
        - name: include_data
          in: query
          schema:
            type: boolean
            default: false
          description: Включить полные данные
      responses:
        '200':
          description: Список снимков
          content:
            application/json:
              schema:
                type: object
                properties:
                  product_id:
                    $ref: '#/components/schemas/ProductId'
                  current_snapshot:
                    $ref: '#/components/schemas/ProductSnapshot'
                  snapshots:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductSnapshot'

  /moderation/snapshots/{snapshot_id}:
    get:
      summary: Получить снимок по ID
      operationId: getSnapshot
      tags:
        - Snapshots
      parameters:
        - $ref: '#/components/parameters/SnapshotIdParam'
      responses:
        '200':
          description: Данные снимка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSnapshot'

  /moderation/snapshots/{snapshot_id}/diff:
    get:
      summary: Получить различия между снимками
      operationId: getSnapshotDiff
      tags:
        - Snapshots
      parameters:
        - $ref: '#/components/parameters/SnapshotIdParam'
        - name: compare_with
          in: query
          required: true
          schema:
            type: integer
          description: ID снимка для сравнения
      responses:
        '200':
          description: Различия
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotDiff'

  # --- Отправка результата в B2B ---
  /webhooks/b2b/moderation-result:
    post:
      summary: Отправка результата модерации в B2B
      operationId: sendModerationResult
      tags:
        - Webhooks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModerationResultEvent'
      responses:
        '202':
          description: Результат принят
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "accepted"
        '400':
          description: Ошибка в данных
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --- Статистика ---
  /moderation/stats:
    get:
      summary: Статистика модерации
      operationId: getModerationStats
      tags:
        - Moderation
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month, all]
            default: week
        - name: moderator_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Статистика
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModerationStats'
